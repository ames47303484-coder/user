<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة الطالب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loginScreen" class="screen active">
        <div class="login-card">
            <div class="avatar">👨‍🎓</div>
            <h2>دخول المنصة</h2>
            <p>أدخل اليوزر الخاص بك للمتابعة</p>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="اليوزر الخاص بك" autocomplete="off" required>
                <div id="autoGreeting" class="auto-greeting"></div>
                <button type="submit">دخول للمنصة</button>
            </form>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <div id="appScreen" class="screen">
        <header class="app-header">
            <div class="header-top">
                <div class="user-info">
                    <p style="font-size:13px; opacity:0.9;">مرحباً بك،</p>
                    <h3 id="welcomeMsg">اسم الطالب</h3>
                    <div id="daysBadge" class="days-badge"></div>
                </div>
                <button onclick="logout()" class="logout-btn">خروج</button>
            </div>
        </header>

        <div class="content">
            <div id="lessonsTab" class="app-tab active">
                <h2 class="page-title">موادي ودروسي 📚</h2>
                <div id="lessonsContainer"></div>
            </div>

            <div id="adsTab" class="app-tab">
                <h2 class="page-title">لوحة الإعلانات 📢</h2>
                <div id="adsContainer"></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchAppTab('lessonsTab', this)">
                <span class="nav-icon">📚</span>
                <span class="nav-text">الدروس</span>
            </div>
            <div class="nav-item" onclick="switchAppTab('adsTab', this)">
                <span class="nav-icon">📢</span>
                <span class="nav-text">الإعلانات</span>
            </div>
        </nav>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">عنوان الدرس</h3>
                <button class="close-btn" onclick="closeVideo()">&times;</button>
            </div>
            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
